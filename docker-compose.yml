services:
  db:
    image: pgvector/pgvector:pg16
    container_name: omnichat-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: omnichat
      POSTGRES_USER: omnichat
      POSTGRES_PASSWORD: omnichat
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnichat -d omnichat"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    container_name: omnichat-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omnichat-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Inside the docker network hostnames are "db" and "redis", not "localhost"
      DATABASE_URL: postgresql://omnichat:omnichat@db:5432/omnichat?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      ANTHROPIC_BASE_URL: https://api.claudehub.fun
      ANTHROPIC_AUTH_TOKEN: sk-hub-dUZaHHmlL9vFHZjtb6ffE3656ywMi3yk
      OPENROUTER_API_KEY: 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
      OPENROUTER_BASE_URL: https://openrouter.ai/api/v1
      NEXTAUTH_SECRET: PPm5pLwu6AnmnM9JqU+4FwxQpSuSIqhyPXdDd3lE9Qk=
      NEXTAUTH_URL: https://vibeneura.online
      AUTH_SECRET: PPm5pLwu6AnmnM9JqU+4FwxQpSuSIqhyPXdDd3lE9Qk=
      AUTH_URL: https://vibeneura.online
      AUTH_TRUST_HOST: "true"
      GOOGLE_CLIENT_ID: 997990400106-s001ku0bo5k4fs0sjptqpl34fttlbinr.apps.googleusercontent.com
      GOOGLE_CLIENT_SECRET: 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
      TELEGRAM_BOT_TOKEN: 8173289687:AAG3TUNpAE9NAqQekaagmTxOsTj0mmhfna8
      TELEGRAM_BOT_USERNAME: vibeneura_robot
